services:
  # Main training/inference container
  moe-distill:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moe-distill
    runtime: ${DOCKER_RUNTIME:-nvidia}
    env_file:
      - .env
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-0}
      # Device configuration
      - DEVICE=${DEVICE:-cuda}
      # Model configuration
      - base_model_name=${base_model_name:-Qwen/Qwen3-4B-Instruct}
      - load_in_4bit=${load_in_4bit:-true}
      - max_seq_len=${max_seq_len:-4096}
      # MoE configuration
      - num_experts=${num_experts:-4}
      - top_k=${top_k:-2}
      - hidden_size=${hidden_size:-2560}
      - intermediate_size=${intermediate_size:-5120}
      # Training configuration
      - epochs=${epochs:-3}
      - batch_size=${batch_size:-1}
      - learning_rate=${learning_rate:-2e-4}
      - gradient_checkpointing=${gradient_checkpointing:-true}
      # Teacher backend: "ollama" (default) or "docker_model_runner"
      - TEACHER_BACKEND=${TEACHER_BACKEND:-ollama}
      - TEACHER_MODEL=${TEACHER_MODEL:-qwen3.5:27b}
      # Docker Model Runner URL (if using that backend)
      - DOCKER_MODEL_RUNNER_URL=${DOCKER_MODEL_RUNNER_URL:-http://model-runner.docker.internal/engines/v1}
      # Distillation configuration
      - distill_n_samples=${distill_n_samples:-2000}
      - distill_temperature=${distill_temperature:-0.7}
      - distill_max_tokens=${distill_max_tokens:-2048}
    volumes:
      # Mount .env file for configuration
      - ./.env:/app/.env
      # Mount data directory for datasets
      - ./data:/app/data
      # Mount checkpoints directory for model weights
      - ./checkpoints:/app/checkpoints
      # Mount logs directory for TensorBoard
      - ./logs:/app/logs
      # Mount HuggingFace cache to avoid re-downloading models
      - huggingface_cache:/root/.cache/huggingface
    ports:
      - "6006:6006"  # TensorBoard
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: tail -f /dev/null  # Keep container running for interactive use

  # TensorBoard service (optional - can also run from main container)
  tensorboard:
    image: tensorflow/tensorflow:latest
    container_name: moe-tensorboard
    volumes:
      - ./logs:/logs
    ports:
      - "6006:6006"
    command: tensorboard --logdir=/logs --host=0.0.0.0
    profiles:
      - tensorboard  # Only start with --profile tensorboard

volumes:
  huggingface_cache:
